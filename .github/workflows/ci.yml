name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消同一分支上正在跑的旧 run,只保留最新一次
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: check + unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # 单元测试是纯 JS,不需要可选的 Remotion 渲染链路(--omit=optional 让 CI 更快更稳)
      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Syntax check
        run: npm run check

      # A few tests (e.g. identity-card overlay) need a real font file on disk.
      # This also validates the documented `fetch-fonts` setup path on Linux.
      - name: Fetch default font
        run: npm run fetch-fonts

      - name: Unit tests
        run: npm run test:unit
